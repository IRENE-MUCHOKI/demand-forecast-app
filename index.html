<!DOCTYPE html>
<html>
<head>
    <title>Demand Forecasting App</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        input, select { margin: 5px; padding: 8px; }
        button { padding: 10px; }
    </style>
</head>
<body>

<h2>Demand Forecasting</h2>

<form action="/predict" method="post">
    <label>Date:</label>
    <input type="date" name="date" required><br>

    <label>Price:</label>
    <input type="number" step="any" name="price"><br>

    <label>Inventory Level:</label>
    <input type="number" name="inventory"><br>

    <label>Discount:</label>
    <input type="number" name="discount"><br>

    <label>Store:</label>
    <select name="store">
        <option>S001</option>
        <option>S002</option>
    </select><br>

    <label>Product:</label>
    <select name="product">
        <option>P0001</option>
        <option>P0002</option>
    </select><br>

    <label>Category:</label>
    <select name="category">
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Groceries</option>
    </select><br>

    <label>Region:</label>
    <select name="region">
        <option>North</option>
        <option>South</option>
    </select><br>

    <label>Weather:</label>
    <select name="weather">
        <option>Sunny</option>
        <option>Rainy</option>
        <option>Snowy</option>
        <option>Cloudy</option>
    </select><br>

    <label>Season:</label>
    <select name="season">
        <option>Winter</option>
        <option>Summer</option>
    </select><br>

    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h3>Predicted Units Sold: {{ prediction }}</h3>
{% endif %}

</body>
</html>
